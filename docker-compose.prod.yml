services:
  postgres:
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    restart: always

  backend:
    restart: always
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis

  ingestion:
    restart: always
    environment:
      REDIS_HOST: redis

  worker:
    restart: always
    environment:
      REDIS_HOST: redis
      POSTGRES_HOST: postgres

  frontend:
    restart: always

volumes:
  postgres_data:
